<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjetas Antonio Zerda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    font-family: 'Outfit', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 32px;
    min-height: 100vh;
  }

  .sheets-row {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* A4 a escala: 210x297mm → 420x594px (2px/mm) */
  .a4 {
    width: 420px;
    height: 594px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    padding: 20px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(5, 1fr);
    gap: 5px;
    overflow: visible;
  }

  /* ── TARJETA BASE (frente) ── */
  .tc {
    width: 100%;
    height: 100%;
    border-radius: 5px;
    position: relative;
    overflow: hidden;
  }

  /* FRENTE */
  .tc-front {
    background: linear-gradient(135deg, #0d0d1a 0%, #111827 60%, #0d1f2d 100%);
    border: 0.5px solid rgba(0,210,180,0.3);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8px 8px 7px 8px;
  }

  .tc-front::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,210,180,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,210,180,0.04) 1px, transparent 1px);
    background-size: 12px 12px;
  }

  .tc-front::after {
    content: '';
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,210,180,0.2) 0%, transparent 70%);
    right: -15px;
    top: -25px;
    pointer-events: none;
  }

  .tf-top {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .tf-logo {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tf-logobox {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    background: linear-gradient(135deg, #00d2b4, #0077ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9px;
    color: #fff;
    flex-shrink: 0;
  }

  .tf-company {
    font-size: 5px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .tf-company-sub {
    font-size: 3.5px;
    color: #00d2b4;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .tf-badge {
    background: rgba(0,210,180,0.1);
    border: 0.5px solid rgba(0,210,180,0.4);
    border-radius: 8px;
    padding: 1.5px 4px;
    font-size: 3.5px;
    color: #00d2b4;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .tf-bottom {
    position: relative;
    z-index: 1;
  }

  .tf-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 12px rgba(0,210,180,0.5);
  }

  .tf-name span { color: #00d2b4; }

  .tf-divider {
    width: 16px;
    height: 1px;
    background: linear-gradient(90deg, #00d2b4, transparent);
    margin: 3px 0;
  }

  .tf-titles { display: flex; flex-direction: column; gap: 1px; }

  .tf-title {
    font-size: 3.5px;
    color: #ffffff;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .tf-title strong { color: #00d2b4; font-weight: 700; }

  /* REVERSO */
  .tc-back {
    background: linear-gradient(135deg, #0d1f2d 0%, #0d0d1a 100%);
    border: 0.5px solid rgba(0,119,255,0.3);
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }

  .tc-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 10% 90%, rgba(0,119,255,0.15) 0%, transparent 60%);
    border-radius: 5px;
  }

  .tb-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 6px 8px 10px;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .tb-right {
    width: 52px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border-left: 0.5px solid rgba(0,119,255,0.2);
    padding: 4px;
    position: relative;
    z-index: 1;
  }

  .tb-contact-title {
    font-size: 3.5px;
    letter-spacing: 1.5px;
    color: #00d2b4;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 1px;
  }

  .tb-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tb-icon {
    width: 10px;
    height: 10px;
    border-radius: 2.5px;
    background: rgba(0,119,255,0.12);
    border: 0.5px solid rgba(0,119,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .tb-icon svg { width: 5px; height: 5px; fill: #0077ff; }
  .tb-icon.wa svg { fill: #25d366; }
  .tb-icon.wa { background: rgba(37,211,102,0.1); border-color: rgba(37,211,102,0.3); }

  .tb-label { font-size: 3px; color: #00d2b4; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  .tb-text  { font-size: 4.5px; color: #ffffff; font-weight: 600; }

  .tb-qr-box {
    width: 44px;
    height: 44px;
    background: #fff;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 8px rgba(0,119,255,0.3);
  }

  .tb-qr-box img { width: 42px; height: 42px; display: block; }

  .tb-qr-label {
    font-size: 3px;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    font-weight: 600;
    line-height: 1.4;
  }

  /* ── Líneas de corte ── */
  .cut-h, .cut-v {
    position: absolute;
    background: rgba(180,0,0,0.15);
    pointer-events: none;
  }

  @media print {
    body { background: #fff; padding: 0; gap: 20px; }
    .sheets-row { gap: 20px; }
    .a4 { box-shadow: none; border: 1px solid #eee; }
  }
</style>
</head>
<body>

<div class="sheets-row">

  <div class="a4" id="sheet-front">
    </div>

  <div class="a4" id="sheet-back">
    </div>

</div>

<script>
  const QR_URL = 'https://mwkleiin-bit.github.io/MW-Kleiin/';
  const qrSrc  = `https://chart.googleapis.com/chart?chs=56x56&cht=qr&chl=${encodeURIComponent(QR_URL)}&choe=UTF-8`;

  // ── FRENTE HTML ──
  function frontHTML() {
    return `
    <div class="tc tc-front">
      <div class="tf-top">
        <div class="tf-logo">
          <div class="tf-logobox">K</div>
          <div>
            <div class="tf-company">Kleiin MW</div>
            <div class="tf-company-sub">Soluciones Digitales</div>
          </div>
        </div>
        <div class="tf-badge">PYME</div>
      </div>
      <div class="tf-bottom">
        <div class="tf-name"><span>Antonio</span> Zerda</div>
        <div class="tf-divider"></div>
        <div class="tf-titles">
          <div class="tf-title"><strong>Director General</strong> · Kleiin MW</div>
          <div class="tf-title">Tec. Superior en <strong>Desarrollo de Software</strong></div>
        </div>
      </div>
    </div>`;
  }

  // ── REVERSO HTML ──
  function backHTML() {
    return `
    <div class="tc tc-back">
      <div class="tb-left">
        <div class="tb-contact-title">Contacto</div>
        <div class="tb-row">
          <div class="tb-icon wa">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.857L.057 23.882l6.162-1.615A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 01-5.001-1.368l-.36-.213-3.655.957.975-3.563-.234-.374A9.821 9.821 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/></svg>
          </div>
          <div>
            <div class="tb-label">WhatsApp</div>
            <div class="tb-text">+54 9 3794 082942</div>
          </div>
        </div>
        <div class="tb-row">
          <div class="tb-icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <div>
            <div class="tb-label">Email</div>
            <div class="tb-text">kleiinmw@gmail.com</div>
          </div>
        </div>
        <div class="tb-row">
          <div class="tb-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1 17.93V18a1 1 0 00-2 0v1.93C6.054 19.48 4 16.97 4 14h1a1 1 0 000-2H4c0-2.97 2.054-5.48 5-5.93V8a1 1 0 002 0V6.07C14.946 6.52 17 9.03 17 12h-1a1 1 0 000 2h1c0 2.97-2.054 5.48-5 5.93z"/></svg>
          </div>
          <div>
            <div class="tb-label">Web</div>
            <div class="tb-text">mwkleiin-bit.github.io</div>
          </div>
        </div>

      </div>
      <div class="tb-right">
        <div class="tb-qr-box">
          <img src="${qrSrc}" alt="QR" loading="lazy">
        </div>
        <div class="tb-qr-label">Scan<br>web</div>
      </div>
    </div>`;
  }

  // ── Poblar hojas ──
  const sheetFront = document.getElementById('sheet-front');
  const sheetBack  = document.getElementById('sheet-back');

  for (let i = 0; i < 10; i++) {
    const divF = document.createElement('div');
    divF.innerHTML = frontHTML();
    sheetFront.appendChild(divF.firstElementChild);

    const divB = document.createElement('div');
    divB.innerHTML = backHTML();
    sheetBack.appendChild(divB.firstElementChild);
  }
</script>
</body>
</html>
